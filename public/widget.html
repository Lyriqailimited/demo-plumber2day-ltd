<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <script>
    const CONFIG = {
      BACKEND_URL: "https://widget.numbero.org",
      ASSISTANT_ID: "assistant_plumbing_plumber2day_ltd_1775823776",
      PAGE_TITLE: "Plumber2day Ltd AI Widget",
      BADGE_TEXT: "Plumber2day Ltd",
      TITLE: "Talk to Plumber2day Ltd's AI Receptionist",
      SUBTITLE: "24/7 AI answers for all your plumbing questions in Leeds",
      START_BUTTON_TEXT: "Start Conversation",
      END_BUTTON_TEXT: "End Call",
      STATUS_READY: "Ready to assist",
      STATUS_CONNECTED: "Assistant connected",
      GREETING_TEXT: "<Greeting message from the assistant>",
      CONNECTING_TEXT: "Connecting to assistant...",
      CONNECTED_TEXT: "Connected. How can I help?",
      AGENT_READY_TEXT: "Assistant is ready.",
      DISCONNECTED_TEXT: "Call ended",
      CONNECTION_FAILED_TEXT: "Connection failed. Please try again.",
      PRIMARY_COLOR: "#f2b90c",
      ACCENT_COLOR: "#f2b90c",
      ACCENT_COLOR_HOVER: "#d4a20b",
      END_BUTTON_COLOR: "#ef4444",
      END_BUTTON_HOVER: "#dc2626",
      TEXT_COLOR: "#ffffff",
      SUBTITLE_COLOR: "#94a3b8",
      SUCCESS_COLOR: "#10B981",
    };
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice AI Widget</title>

  <style>
    :root {
      --primary-color: #f2b90c;
      --accent-color: #f2b90c;
      --accent-color-hover: #d4a20b;
      --end-button-color: #ef4444;
      --end-button-hover: #dc2626;
      --text-color: #ffffff;
      --subtitle-color: #94a3b8;
      --success-color: #10B981;
      --bg-dark: #0F2A45;
      --card-bg: #132F4C;
      --card-border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: transparent;
    }

    .widget-container {
      width: 100%; height: 100%; background: var(--card-bg);
      display: flex; flex-direction: column; position: relative; overflow: hidden;
    }

    .gradient-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(242,185,12,0.15) 0%, transparent 60%);
      z-index: 0; pointer-events: none;
    }

    .header { position: relative; z-index: 10; padding: 20px 24px 0; flex-shrink: 0; }
    .badge { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .badge-logo { height: 36px; width: auto; object-fit: contain; }
    .title { font-size: 1.6rem; font-weight: 700; color: var(--text-color); line-height: 1.2; margin-bottom: 8px; }
    .subtitle { color: var(--subtitle-color); font-size: 0.85rem; line-height: 1.5; }

    .visualizer-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px; position: relative; z-index: 10; min-height: 0;
    }

    .pulsing-circle-container {
      position: relative; display: flex; align-items: center; justify-content: center;
      width: 100px; height: 100px;
    }

    .ripple {
      position: absolute; inset: 0;
      background: color-mix(in srgb, var(--primary-color) 20%, transparent);
      border-radius: 50%; opacity: 0; transform: scale(1);
    }
    .ripple.active { animation: ripple-animation 2s ease-out infinite; }
    @keyframes ripple-animation {
      0% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.4; }
      100% { opacity: 0; transform: scale(2); }
    }
    .ripple.delayed.active {
      animation: ripple-animation-small 2s ease-out infinite; animation-delay: 0.5s;
    }
    @keyframes ripple-animation-small {
      0% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.4; }
      100% { opacity: 0; transform: scale(1.5); }
    }

    .core-circle {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, #d4a20b 0%, #f2b90c 50%, #F4897A 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 10;
      box-shadow: 0 0 24px 6px rgba(242,185,12,0.3);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .core-circle.active { animation: pulse-circle 1.5s ease-in-out infinite; box-shadow: 0 0 40px 12px rgba(242,185,12,0.5); }
    @keyframes pulse-circle { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    .visualizer-bars { display: flex; align-items: center; justify-content: center; gap: 3px; height: 36px; }
    .bar { width: 6px; height: 6px; background: white; border-radius: 9999px; opacity: 0.9; }
    .bar.active { animation: bar-animation 0.6s ease-in-out infinite alternate; }
    .bar:nth-child(1).active { animation-delay: 0.1s; }
    .bar:nth-child(2).active { animation-delay: 0.2s; }
    .bar:nth-child(3).active { animation-delay: 0.3s; }
    .bar:nth-child(4).active { animation-delay: 0.4s; }
    .bar:nth-child(5).active { animation-delay: 0.5s; }
    @keyframes bar-animation { 0% { height: 8px; } 100% { height: 28px; } }

    .status-badge {
      position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
      white-space: nowrap; padding: 4px 12px; border-radius: 9999px;
      font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px;
    }
    .status-badge.disconnected { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
    .status-badge.connected { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-dot.disconnected { background: #94a3b8; }
    .status-dot.connected { background: var(--success-color); animation: pulse-dot 1s ease-in-out infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .action-area {
      padding: 16px 24px 20px; position: relative; z-index: 10;
      background: rgba(0,0,0,0.2); border-top: 1px solid var(--card-border);
      backdrop-filter: blur(10px); flex-shrink: 0;
    }
    .transcript-area {
      text-align: center; margin-bottom: 16px; min-height: 40px;
      display: flex; align-items: center; justify-content: center; padding: 0 8px;
    }
    .transcript-text { font-size: 0.95rem; font-weight: 500; color: var(--text-color); line-height: 1.4; }
    .call-button {
      width: 100%; padding: 14px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 1rem; font-weight: 600; border: none; cursor: pointer;
      transition: all 0.3s ease; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .call-button.start { background: linear-gradient(135deg, #f2b90c 0%, #d4a20b 100%); color: white; }
    .call-button.end { background: var(--end-button-color); color: white; }
    .call-button svg { width: 18px; height: 18px; }
    .error-message {
      margin-top: 12px; padding: 10px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px; color: #f87171; font-size: 13px; text-align: center;
    }
    #audioOutput { display: none; }
  </style>
</head>

<body>
  <audio id="audioOutput" autoplay></audio>
  <div class="widget-container">
    <div class="gradient-bg"></div>
    <div class="header">
      <div class="badge"><img src="logo.webp" alt="Plumber2day Ltd" class="badge-logo"></div>
      <h1 class="title">Talk to Plumber2day Ltd's AI Receptionist</h1>
      <p class="subtitle">24/7 AI answers for all your plumbing questions in Leeds</p>
    </div>
    <div class="visualizer-area">
      <div class="pulsing-circle-container">
        <div class="ripple" id="ripple1"></div>
        <div class="ripple delayed" id="ripple2"></div>
        <div class="core-circle" id="coreCircle">
          <div class="visualizer-bars">
            <div class="bar" id="bar1"></div><div class="bar" id="bar2"></div>
            <div class="bar" id="bar3"></div><div class="bar" id="bar4"></div>
            <div class="bar" id="bar5"></div>
          </div>
        </div>
        <div class="status-badge disconnected" id="statusBadge">
          <div class="status-dot disconnected" id="statusDot"></div>
          <span id="statusText">Ready to connect</span>
        </div>
      </div>
    </div>
    <div class="action-area">
      <div class="transcript-area">
        <p class="transcript-text" id="transcriptText">Hi, how can I help you today?</p>
      </div>
      <button class="call-button start" id="callButton" onclick="toggleCall()">
        <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" x2="12" y1="19" y2="22"/>
        </svg>
        <span id="buttonText">Start Conversation</span>
      </button>
      <div class="error-message" id="errorMessage" style="display: none;"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/Lyriqailimited/bpoai-widget-static@main/widget-bundle.js"></script>
  <script>
    const { PipecatClient, RTVIEvent, WebSocketTransport } = window;
    let isConnected = false, pipecatClient = null;
    const audioElement = document.getElementById('audioOutput');
    const callButton = document.getElementById('callButton');
    const buttonText = document.getElementById('buttonText');
    const micIcon = document.getElementById('micIcon');
    const transcriptText = document.getElementById('transcriptText');
    const statusBadge = document.getElementById('statusBadge');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const coreCircle = document.getElementById('coreCircle');
    const ripple1 = document.getElementById('ripple1');
    const ripple2 = document.getElementById('ripple2');
    const bars = ['bar1','bar2','bar3','bar4','bar5'].map(id => document.getElementById(id));
    const errorMessage = document.getElementById('errorMessage');

    function applyBranding() {
      const root = document.documentElement;
      root.style.setProperty('--primary-color', CONFIG.PRIMARY_COLOR);
      root.style.setProperty('--accent-color', CONFIG.ACCENT_COLOR);
      document.title = CONFIG.PAGE_TITLE;
      document.querySelector('.title').textContent = CONFIG.TITLE;
      document.querySelector('.subtitle').textContent = CONFIG.SUBTITLE;
      buttonText.textContent = CONFIG.START_BUTTON_TEXT;
      statusText.textContent = CONFIG.STATUS_READY;
      transcriptText.textContent = CONFIG.GREETING_TEXT;
    }
    applyBranding();

    function updateUI(connected) {
      isConnected = connected;
      if (connected) {
        callButton.className = 'call-button end';
        buttonText.textContent = CONFIG.END_BUTTON_TEXT;
        micIcon.style.display = 'none';
        statusBadge.className = 'status-badge connected';
        statusDot.className = 'status-dot connected';
        statusText.textContent = CONFIG.STATUS_CONNECTED;
        coreCircle.classList.add('active');
        ripple1.classList.add('active'); ripple2.classList.add('active');
        bars.forEach(b => b.classList.add('active'));
      } else {
        callButton.className = 'call-button start';
        buttonText.textContent = CONFIG.START_BUTTON_TEXT;
        micIcon.style.display = 'block';
        statusBadge.className = 'status-badge disconnected';
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = CONFIG.STATUS_READY;
        coreCircle.classList.remove('active');
        ripple1.classList.remove('active'); ripple2.classList.remove('active');
        bars.forEach(b => b.classList.remove('active'));
      }
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.style.display = 'block';
      setTimeout(() => { errorMessage.style.display = 'none'; }, 5000);
    }

    async function connect() {
      try {
        errorMessage.style.display = 'none';
        const client = new PipecatClient({
          transport: new WebSocketTransport(), enableMic: true, enableCam: false,
          callbacks: {
            onConnected: () => { updateUI(true); transcriptText.textContent = CONFIG.CONNECTED_TEXT; },
            onDisconnected: () => { updateUI(false); transcriptText.textContent = CONFIG.DISCONNECTED_TEXT; },
            onBotReady: () => { transcriptText.textContent = CONFIG.AGENT_READY_TEXT; },
            onUserTranscript: (d) => { if (d.final) transcriptText.textContent = `You: ${d.text}`; },
            onBotTranscript: (d) => { transcriptText.textContent = `Agent: ${d.text}`; },
            onError: (err) => { showError(err?.message || 'Unknown error'); }
          }
        });
        pipecatClient = client;
        client.on(RTVIEvent.TrackStarted, (track, participant) => {
          if (!participant?.local && track.kind === 'audio' && audioElement) {
            audioElement.srcObject = new MediaStream([track]);
          }
        });
        transcriptText.textContent = 'Initializing devices...';
        await client.initDevices();
        transcriptText.textContent = CONFIG.CONNECTING_TEXT;
        const res = await fetch(`${CONFIG.BACKEND_URL}/frontend/connect`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({assistant_id: CONFIG.ASSISTANT_ID})
        });
        if (!res.ok) throw new Error(`Failed: ${res.status}`);
        const { ws_url } = await res.json();
        await client.connect({ wsUrl: ws_url });
      } catch (err) {
        showError(err.message || 'Connection failed');
        updateUI(false);
        transcriptText.textContent = CONFIG.CONNECTION_FAILED_TEXT;
      }
    }

    async function disconnect() {
      if (pipecatClient) {
        try { await pipecatClient.disconnect(); } catch(e) {}
        pipecatClient = null; updateUI(false);
      }
    }

    async function toggleCall() { isConnected ? await disconnect() : await connect(); }
    window.addEventListener('beforeunload', () => { if (pipecatClient) pipecatClient.disconnect().catch(console.error); });
  </script>
</body>
</html>
